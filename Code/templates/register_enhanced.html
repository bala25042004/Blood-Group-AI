{% extends "base.html" %}
{% block title %}Register - Blood Eye Medical Analysis{% endblock %}
{% block content %}

<style>
    .register-page {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, rgba(139, 0, 0, 0.2) 0%, rgba(193, 18, 31, 0.2) 100%), url('{{ url_for("static", filename="img/bg_blood_group.jpg") }}') center/cover no-repeat fixed;
        background-attachment: fixed;
        position: relative;
    }



    .register-container {
        width: 100%;
        max-width: 500px;
        position: relative;
        z-index: 1;
    }

    .register-card {
        background: rgba(22, 27, 34, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(193, 18, 31, 0.2);
        border-radius: 1.5rem;
           padding: 2rem;
           background: linear-gradient(135deg, rgba(139, 0, 0, 0.2) 0%, rgba(193, 18, 31, 0.2) 100%);
           position: relative;
    }

    .register-card:hover {
        border-color: rgba(193, 18, 31, 0.5);
        box-shadow: 0 25px 70px rgba(193, 18, 31, 0.2);
    }

    .register-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .register-title {
        font-size: 1.8rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 0.5rem;
    }

    .register-subtitle {
        color: #a0a0a0;
        font-size: 0.95rem;
    }

    .logo-icon {
        font-size: 3rem;
        background: linear-gradient(135deg, #C1121F 0%, #FFB703 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
        display: block;
    }

    .tab-switcher {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        background: rgba(193, 18, 31, 0.1);
        padding: 0.5rem;
        border-radius: 0.75rem;
    }

    .tab-btn {
        flex: 1;
        padding: 0.75rem;
        background: transparent;
        border: none;
        color: #a0a0a0;
        font-weight: 600;
        cursor: pointer;
        border-radius: 0.5rem;
        transition: all 0.3s ease;
        font-size: 0.95rem;
    }

    .tab-btn.active {
        background: linear-gradient(135deg, #C1121F 0%, #780000 100%);
        color: white;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        color: #d0d0d0;
        font-weight: 600;
        margin-bottom: 0.75rem;
        font-size: 0.95rem;
    }

    .form-input {
        width: 100%;
        padding: 0.9rem 1.2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(193, 18, 31, 0.2);
        border-radius: 0.75rem;
        color: #ffffff;
        transition: all 0.3s ease;
        font-size: 0.95rem;
    }

    .form-input::placeholder {
        color: #707090;
    }

    .form-input:focus {
        outline: none;
        border-color: #C1121F;
        background: rgba(193, 18, 31, 0.1);
        box-shadow: 0 0 10px rgba(193, 18, 31, 0.2);
    }

    .phone-input-group {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.75rem;
        align-items: end;
    }

    .country-code {
        padding: 0.9rem 1rem;
        background: #1a1a1a;
        border: 1px solid rgba(193, 18, 31, 0.4);
        border-radius: 0.75rem;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
    }

    .country-code option {
        background: #1a1a1a;
        color: #ffffff;
        padding: 10px;
    }

    .password-strength {
        margin-top: 0.5rem;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
    }

    .password-strength-bar {
        height: 100%;
        width: 0%;
        background: #ff6b6b;
        transition: all 0.3s ease;
    }

    .password-strength-bar.weak {
        width: 33%;
        background: #ff6b6b;
    }

    .password-strength-bar.medium {
        width: 66%;
        background: #ffd43b;
    }

    .password-strength-bar.strong {
        width: 100%;
        background: #51cf66;
    }

    .strength-text {
        font-size: 0.75rem;
        color: #a0a0a0;
        margin-top: 0.25rem;
    }

    .otp-input-group {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 0.5rem;
        margin: 1.5rem 0;
    }

    .otp-input {
        width: 100%;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(193, 18, 31, 0.2);
        border-radius: 0.5rem;
        color: #ffffff;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        transition: all 0.3s ease;
    }

    .otp-input:focus {
        outline: none;
        border-color: #FFB703;
        background: rgba(255, 183, 3, 0.1);
    }

    .submit-btn {
        width: 100%;
        padding: 1rem 2rem;
        background: linear-gradient(135deg, #C1121F 0%, #780000 100%);
        color: white;
        border: 2px solid #FFB703;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 1rem;
    }

    .submit-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(193, 18, 31, 0.4), 0 0 15px rgba(255, 183, 3, 0.3);
    }

    .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .error-message {
        background: rgba(193, 18, 31, 0.2);
        border: 1px solid #C1121F;
        color: #ff9999;
        padding: 1rem;
        border-radius: 0.75rem;
        margin-bottom: 1.5rem;
        text-align: center;
        font-weight: 600;
        display: none;
    }

    .error-message.show {
        display: block;
    }

    .success-message {
        background: rgba(81, 207, 102, 0.2);
        border: 1px solid #51cf66;
        color: #99e99c;
        padding: 1rem;
        border-radius: 0.75rem;
        margin-bottom: 1.5rem;
        text-align: center;
        font-weight: 600;
        display: none;
    }

    .success-message.show {
        display: block;
    }

    .oauth-divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: #707090;
        font-size: 0.9rem;
    }

    .oauth-divider::before,
    .oauth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(193, 18, 31, 0.2);
    }

    .oauth-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .oauth-btn {
        padding: 0.9rem 1.2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(193, 18, 31, 0.2);
        border-radius: 0.75rem;
        color: #d0d0d0;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.95rem;
    }

    .oauth-btn:hover {
        border-color: rgba(193, 18, 31, 0.5);
        background: rgba(193, 18, 31, 0.1);
    }

    .register-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(193, 18, 31, 0.2);
    }

    .register-footer-text {
        color: #a0a0a0;
        font-size: 0.95rem;
    }

    .register-footer-link {
        color: #FFB703;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .register-footer-link:hover {
        color: #C1121F;
    }

    .timer {
        color: #FFB703;
        font-weight: 600;
        margin-top: 0.5rem;
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
    }

    @media (max-width: 768px) {
        .register-card {
            padding: 2rem 1.5rem;
        }

        .register-title {
            font-size: 1.5rem;
        }

        .oauth-buttons {
            grid-template-columns: 1fr;
        }

        .phone-input-group {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="register-page">
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <span class="logo-icon"><i class="fas fa-user-plus"></i></span>
                <h1 class="register-title">Create Account</h1>
                <p class="register-subtitle">Join our medical AI platform</p>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" onClick="switchTab(event, 'credentials')">
                    <i class="fas fa-user mr-2"></i>Username
                </button>
                <button class="tab-btn" onClick="switchTab(event, 'mobile')">
                    <i class="fas fa-phone mr-2"></i>Mobile OTP
                </button>
            </div>

            <!-- Credentials Tab -->
            <div id="credentials" class="tab-content active">
                <form id="credentials-form" method="post" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user mr-2"></i>Username
                        </label>
                        <input type="text" name="username" class="form-input" placeholder="Choose a username (alphanumeric)" required minlength="4" pattern="[a-zA-Z0-9_]+">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope mr-2"></i>Email (Optional)
                        </label>
                        <input type="email" name="email" class="form-input" placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input type="password" id="password-input" name="password" class="form-input" placeholder="Create a strong password" required minlength="8" onInput="checkPasswordStrength(event)">
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strength-bar"></div>
                        </div>
                        <div class="strength-text" id="strength-text"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-lock mr-2"></i>Confirm Password
                        </label>
                        <input type="password" id="confirm-password" name="confirm_password" class="form-input" placeholder="Re-enter your password" required minlength="8">
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-user-check mr-2"></i>Create Account
                    </button>

                    <div class="oauth-divider">or register with</div>

                    <div class="oauth-buttons">
                        <a href="{{ url_for('google.login', _external=True) if url_for else '/login/google' }}" class="oauth-btn">
                            <i class="fab fa-google"></i> Google
                        </a>
                        <a href="#" class="oauth-btn" title="Coming soon">
                            <i class="fab fa-github"></i> GitHub
                        </a>
                    </div>
                </form>
            </div>

            <!-- Mobile OTP Tab -->
            <div id="mobile" class="tab-content">
                <form id="mobile-form">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone mr-2"></i>Mobile Number
                        </label>
                        <div class="phone-input-group">
                            <select class="country-code" id="country-code">
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+91">🇮🇳 +91</option>
                                <option value="+86">🇨🇳 +86</option>
                                <option value="+81">🇯🇵 +81</option>
                                <option value="+33">🇫🇷 +33</option>
                                <option value="+49">🇩🇪 +49</option>
                            </select>
                            <input type="tel" id="phone-number" class="form-input" placeholder="Enter phone number" required pattern="[0-9]{8,}">
                        </div>
                    </div>

                    <button type="button" class="submit-btn" id="send-otp-btn" onClick="sendOTP()">
                        <i class="fas fa-paper-plane mr-2"></i>Send OTP
                    </button>

                    <!-- OTP Input (hidden until sent) -->
                    <div id="otp-section" style="display: none; margin-top: 1.5rem;">
                        <label class="form-label">Enter OTP (6 digits)</label>
                        <div class="otp-input-group" id="otp-inputs"></div>
                        <div class="timer" id="otp-timer"></div>
                        <button type="button" class="submit-btn" id="verify-otp-btn" onClick="verifyOTP()">
                            <i class="fas fa-check mr-2"></i>Verify OTP
                        </button>
                    </div>

                    <!-- Account Details (shown after OTP verification) -->
                    <div id="account-details" style="display: none; margin-top: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-user mr-2"></i>Username
                            </label>
                            <input type="text" id="mobile-username" class="form-input" placeholder="Choose a username" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-lock mr-2"></i>Password
                            </label>
                            <input type="password" id="mobile-password" class="form-input" placeholder="Create a password" required minlength="8">
                        </div>

                        <button type="button" class="submit-btn" onClick="registerWithMobile()">
                            <i class="fas fa-user-check mr-2"></i>Complete Registration
                        </button>
                    </div>
                </form>
            </div>

            <div class="register-footer">
                <p class="register-footer-text">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="register-footer-link">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(event, tabName) {
        // Hide all tabs
        document.getElementById('credentials').classList.remove('active');
        document.getElementById('mobile').classList.remove('active');

        // Remove active from all buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        // Show selected tab
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function checkPasswordStrength(event) {
        const password = event.target.value;
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        
        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/) && password.match(/[!@#$%^&*]/)) strength++;

        strengthBar.className = 'password-strength-bar';
        if (strength === 1) {
            strengthBar.classList.add('weak');
            strengthText.textContent = '⚠️ Weak password';
        } else if (strength === 2) {
            strengthBar.classList.add('medium');
            strengthText.textContent = '📊 Medium strength';
        } else if (strength >= 3) {
            strengthBar.classList.add('strong');
            strengthText.textContent = '✓ Strong password';
        } else {
            strengthText.textContent = '';
        }
    }

    function sendOTP() {
        const phone = document.getElementById('country-code').value + document.getElementById('phone-number').value;
        const btn = document.getElementById('send-otp-btn');
        
        if (!phone || phone.length < 10) {
            showError('Please enter a valid phone number');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending...';

        fetch('/send-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({phone: phone})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showSuccess('OTP sent! Check your phone.');
                document.getElementById('otp-section').style.display = 'block';
                createOTPInputs();
                startOTPTimer();
            } else {
                showError(data.message || 'Failed to send OTP');
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send OTP';
        })
        .catch(err => {
            showError('Error sending OTP: ' + err);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send OTP';
        });
    }

    function createOTPInputs() {
        const container = document.getElementById('otp-inputs');
        container.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = '1';
            input.className = 'otp-input';
            input.inputMode = 'numeric';
            input.addEventListener('input', (e) => handleOTPInput(e, i));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    document.querySelectorAll('.otp-input')[i - 1].focus();
                }
            });
            container.appendChild(input);
        }
    }

    function handleOTPInput(e, idx) {
        const val = e.target.value;
        const inputs = document.querySelectorAll('.otp-input');
        if (val && idx < 5) {
            inputs[idx + 1].focus();
        }
        
        // Auto-verify when 6 digits are entered
        const otp = Array.from(inputs).map(i => i.value).join('');
        if (otp.length === 6) {
            verifyOTP();
        }
    }

    function startOTPTimer() {
        let seconds = 300; // 5 minutes
        const timer = setInterval(() => {
            if (seconds <= 0) {
                clearInterval(timer);
                document.getElementById('otp-timer').textContent = '⏰ OTP expired';
                return;
            }
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('otp-timer').textContent = `⏱️ OTP expires in ${mins}:${secs.toString().padStart(2, '0')}`;
            seconds--;
        }, 1000);
    }

    function verifyOTP() {
        const inputs = document.querySelectorAll('.otp-input');
        const otp = Array.from(inputs).map(i => i.value).join('');
        
        if (otp.length !== 6) {
            showError('Please enter all 6 digits');
            return;
        }

        fetch('/verify-otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({otp: otp})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showSuccess('OTP verified! Enter your account details.');
                document.getElementById('otp-section').style.display = 'none';
                document.getElementById('account-details').style.display = 'block';
            } else {
                showError(data.message || 'Invalid OTP');
            }
        })
        .catch(err => showError('Verification error: ' + err));
    }

    function registerWithMobile() {
        const phone = document.getElementById('country-code').value + document.getElementById('phone-number').value;
        const username = document.getElementById('mobile-username').value;
        const password = document.getElementById('mobile-password').value;

        if (!username || !password) {
            showError('Please fill in all fields');
            return;
        }

        fetch('/register-mobile', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: username,
                password: password,
                phone: phone
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showSuccess('Account created! Redirecting...');
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                showError(data.message || 'Registration failed');
            }
        })
        .catch(err => showError('Error: ' + err));
    }

    function showError(msg) {
        const errorEl = document.getElementById('error-msg');
        errorEl.textContent = msg;
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showSuccess(msg) {
        const successEl = document.getElementById('success-msg');
        successEl.textContent = msg;
        successEl.classList.add('show');
        setTimeout(() => successEl.classList.remove('show'), 5000);
    }
</script>

{% endblock %}
