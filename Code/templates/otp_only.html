<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Blood Eye</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .otp-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .otp-input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        .btn-otp {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-otp:hover {
            transform: translateY(-2px);
        }
        .btn-otp:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .timer {
            text-align: center;
            color: #666;
            margin: 10px 0;
        }
        .alert-custom {
            border-radius: 10px;
            padding: 15px;
        }
        .phone-input-group {
            display: flex;
            gap: 10px;
        }
        .country-select {
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="otp-card">
        <h3 class="text-center mb-4">
            <i class="fas fa-mobile-alt text-primary"></i> OTP Verification
        </h3>
        <p class="text-muted text-center mb-4">Enter any phone number to receive OTP</p>
        
        <div id="message-area"></div>
        
        <!-- Phone Input Section -->
        <div id="phone-section">
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <div class="phone-input-group">
                    <select id="country-code" class="form-select country-select">
                        <option value="+1">+1</option>
                        <option value="+44">+44</option>
                        <option value="+91" selected>+91</option>
                        <option value="+92">+92</option>
                        <option value="+93">+93</option>
                        <option value="+94">+94</option>
                        <option value="+95">+95</option>
                    </select>
                    <input type="tel" id="phone-number" class="form-control" placeholder="Enter phone number" pattern="[0-9]{8,}">
                </div>
                <small class="text-muted">You can enter any valid phone number</small>
            </div>
            
            <button type="button" class="btn btn-otp" id="send-otp-btn" onclick="sendOTP()">
                <i class="fas fa-paper-plane me-2"></i>Send OTP
            </button>
        </div>
        
        <!-- OTP Input Section (hidden initially) -->
        <div id="otp-section" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Enter OTP sent to <span id="target-phone"></span></label>
                <div class="otp-input-group" id="otp-inputs"></div>
            </div>
            
            <div class="timer" id="otp-timer"></div>
            
            <button type="button" class="btn btn-otp" id="verify-otp-btn" onclick="verifyOTP()">
                <i class="fas fa-check me-2"></i>Verify OTP
            </button>
            
            <button type="button" class="btn btn-link w-100 mt-2" onclick="resendOTP()">
                <i class="fas fa-redo me-1"></i>Resend OTP
            </button>
        </div>
        
        <!-- Success Section (hidden initially) -->
        <div id="success-section" style="display: none;" class="text-center">
            <div class="alert alert-success alert-custom">
                <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                <h4>OTP Verified Successfully!</h4>
                <p>Phone <span id="verified-phone"></span> has been verified.</p>
            </div>
            <button class="btn btn-otp" onclick="resetForm()">
                <i class="fas fa-redo me-2"></i>Try Another Number
            </button>
        </div>
    </div>

    <script>
        let currentPhone = '';
        let timerInterval = null;
        
        function showMessage(message, type) {
            const area = document.getElementById('message-area');
            area.innerHTML = `<div class="alert alert-${type} alert-custom">${message}</div>`;
            setTimeout(() => area.innerHTML = '', 5000);
        }
        
        function sendOTP() {
            const countryCode = document.getElementById('country-code').value;
            const phoneNum = document.getElementById('phone-number').value;
            currentPhone = countryCode + phoneNum;
            
            if (!currentPhone || currentPhone.length < 10) {
                showMessage('Please enter a valid phone number', 'danger');
                return;
            }
            
            const btn = document.getElementById('send-otp-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
            
            fetch('/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone: currentPhone})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('OTP sent to ' + currentPhone + '! Check your phone.', 'success');
                    document.getElementById('phone-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    document.getElementById('target-phone').textContent = currentPhone;
                    createOTPInputs();
                    startOTPTimer();
                } else {
                    showMessage(data.message || 'Failed to send OTP', 'danger');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send OTP';
                }
            })
            .catch(err => {
                showMessage('Error: ' + err, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send OTP';
            });
        }
        
        function createOTPInputs() {
            const container = document.getElementById('otp-inputs');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = '1';
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                input.addEventListener('input', (e) => handleOTPInput(e, i));
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && i > 0) {
                        document.querySelectorAll('.otp-input')[i - 1].focus();
                    }
                });
                container.appendChild(input);
            }
            document.querySelector('.otp-input').focus();
        }
        
        function handleOTPInput(e, idx) {
            const val = e.target.value;
            const inputs = document.querySelectorAll('.otp-input');
            if (val && idx < 5) {
                inputs[idx + 1].focus();
            }
            
            // Auto-verify when 6 digits are entered
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length === 6) {
                verifyOTP(otp);
            }
        }
        
        function startOTPTimer() {
            let seconds = 300; // 5 minutes
            if (timerInterval) clearInterval(timerInterval);
            
            const timerEl = document.getElementById('otp-timer');
            timerEl.innerHTML = `<i class="fas fa-clock me-1"></i> OTP expires in 5:00`;
            
            timerInterval = setInterval(() => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timerEl.innerHTML = `<i class="fas fa-clock me-1"></i> OTP expires in ${mins}:${secs.toString().padStart(2, '0')}`;
                seconds--;
                
                if (seconds < 0) {
                    clearInterval(timerInterval);
                    timerEl.innerHTML = '<span class="text-danger">OTP expired. Click Resend to get a new one.</span>';
                }
            }, 1000);
        }
        
        function verifyOTP(otp) {
            if (!otp) {
                const inputs = document.querySelectorAll('.otp-input');
                otp = Array.from(inputs).map(i => i.value).join('');
            }
            
            if (otp.length !== 6) {
                showMessage('Please enter all 6 digits', 'warning');
                return;
            }
            
            const btn = document.getElementById('verify-otp-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Verifying...';
            
            fetch('/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({otp: otp})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage('OTP Verified!', 'success');
                    document.getElementById('otp-section').style.display = 'none';
                    document.getElementById('success-section').style.display = 'block';
                    document.getElementById('verified-phone').textContent = currentPhone;
                } else {
                    showMessage(data.message || 'Invalid OTP', 'danger');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check me-2"></i>Verify OTP';
                }
            })
            .catch(err => {
                showMessage('Error: ' + err, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check me-2"></i>Verify OTP';
            });
        }
        
        function resendOTP() {
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('phone-section').style.display = 'block';
            document.getElementById('send-otp-btn').disabled = false;
            document.getElementById('send-otp-btn').innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send OTP';
        }
        
        function resetForm() {
            document.getElementById('success-section').style.display = 'none';
            document.getElementById('phone-section').style.display = 'block';
            document.getElementById('phone-number').value = '';
            document.getElementById('send-otp-btn').disabled = false;
            document.getElementById('send-otp-btn').innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send OTP';
            if (timerInterval) clearInterval(timerInterval);
        }
    </script>
</body>
</html>
