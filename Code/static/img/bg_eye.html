<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; background: #0C1117; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Gradient for eye background -->
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1520"/>
      <stop offset="50%" style="stop-color:#0d0a10"/>
      <stop offset="100%" style="stop-color:#050308"/>
    </radialGradient>
    <!-- Iris pattern -->
    <pattern id="irisPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#2a1525" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#3a2035" stroke-width="0.3"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#4a2845" stroke-width="0.2"/>
    </pattern>
    <!-- Blood vessel pattern -->
    <pattern id="vesselPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0,30 Q15,20 30,30 T60,30" fill="none" stroke="#C1121F" stroke-width="1" opacity="0.15"/>
      <path d="M0,20 Q20,10 40,20 T60,20" fill="none" stroke="#8B0000" stroke-width="0.8" opacity="0.1"/>
      <path d="M0,40 Q20,50 40,40 T60,40" fill="none" stroke="#C1121F" stroke-width="0.6" opacity="0.12"/>
    </pattern>
    <!-- Filter for glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#eyeGrad)"/>
  
  <!-- Blood vessel pattern overlay -->
  <rect width="1920" height="1080" fill="url(#vesselPattern)"/>
  
  <!-- Central iris pattern (simulating eye) -->
  <circle cx="960" cy="540" r="400" fill="url(#irisPattern)" opacity="0.3"/>
  <circle cx="960" cy="540" r="350" fill="none" stroke="#4a2040" stroke-width="2" opacity="0.4"/>
  <circle cx="960" cy="540" r="300" fill="none" stroke="#3a1530" stroke-width="1" opacity="0.3"/>
  
  <!-- Pupil -->
  <circle cx="960" cy="540" r="80" fill="#000000" opacity="0.9"/>
  <circle cx="960" cy="540" r="75" fill="none" stroke="#1a0a15" stroke-width="3"/>
  
  <!-- Light reflection -->
  <ellipse cx="930" cy="510" rx="25" ry="15" fill="#ffffff" opacity="0.15" transform="rotate(-30 930 510)"/>
  <ellipse cx="980" cy="570" rx="10" ry="6" fill="#ffffff" opacity="0.08" transform="rotate(30 980 570)"/>
  
  <!-- Red blood cells scattered -->
  <g opacity="0.08">
    <ellipse cx="200" cy="200" rx="15" ry="10" fill="#C1121F" transform="rotate(20 200 200)"/>
    <ellipse cx="1700" cy="300" rx="12" ry="8" fill="#8B0000" transform="rotate(-15 1700 300)"/>
    <ellipse cx="300" cy="800" rx="14" ry="9" fill="#C1121F" transform="rotate(45 300 800)"/>
    <ellipse cx="1600" cy="750" rx="13" ry="8" fill="#A00000" transform="rotate(-30 1600 750)"/>
    <ellipse cx="500" cy="150" rx="11" ry="7" fill="#C1121F" transform="rotate(10 500 150)"/>
    <ellipse cx="1400" cy="150" rx="12" ry="8" fill="#8B0000" transform="rotate(-25 1400 150)"/>
    <ellipse cx="150" cy="600" rx="13" ry="8" fill="#C1121F" transform="rotate(35 150 600)"/>
    <ellipse cx="1750" cy="550" rx="14" ry="9" fill="#A00000" transform="rotate(-40 1750 550)"/>
    <ellipse cx="450" cy="950" rx="12" ry="8" fill="#C1121F" transform="rotate(15 450 950)"/>
    <ellipse cx="1450" cy="900" rx="13" ry="8" fill="#8B0000" transform="rotate(-20 1450 900)"/>
  </g>
  
  <!-- Subtle radial glow from center -->
  <circle cx="960" cy="540" r="500" fill="none" stroke="#C1121F" stroke-width="0.5" opacity="0.1" filter="url(#glow)"/>
  <circle cx="960" cy="540" r="700" fill="none" stroke="#FFB703" stroke-width="0.3" opacity="0.05"/>
  
  <!-- Vignette effect -->
  <rect width="1920" height="1080" fill="url(#vignette)" opacity="0.4"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
</svg>
</body>
</html>
